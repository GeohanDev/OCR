name: CI Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── Build & test .NET backend ──────────────────────────────────────────
  build-backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore OcrErpSystem.sln

      - name: Build
        run: dotnet build OcrErpSystem.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OcrErpSystem.sln --configuration Release --no-build --verbosity normal

  # ── Build & test React frontend ────────────────────────────────────────
  build-frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npm run build
        working-directory: frontend

  # ── Build & push Docker images ────────────────────────────────────────
  # Every push to main   → build + push images tagged :latest + :<sha>
  # Every pull request   → build only (validates Dockerfiles, no push)
  docker:
    name: Docker images
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Login is skipped on PRs (no push needed)
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          # Push only on main push; PRs only build (validates the Dockerfile)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_ACUMATICA_URL=${{ vars.ACUMATICA_URL }}
            VITE_ACUMATICA_CLIENT_ID=${{ vars.ACUMATICA_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
